# ═══════════════════════════════════════════════════════
# TOM V2.0 — config.example.yaml
# Copiez ce fichier vers data/config.yaml et remplissez
# ═══════════════════════════════════════════════════════

profile:
  name: "Prénom Nom"
  email: "prenom@email.com"
  linkedin: "linkedin.com/in/votre-compte/"
  phone: "+33 6 XX XX XX XX"
  available: "Immédiat / Sept 2026"
  skills:
    - Python
    - SQL
    - Power BI
    - Gestion de projet
    - Data Analysis
  education_main: "Master Stratégie & Management"
  education_school: "Votre École / Université"

preferences:
  location:
    city: "Paris"
    country: "France"
    department: "75"
  priorities:
    - "Tech & IA"
    - "Marketing & Communication"
  natural_language_prompt: "Chef de projet digital à Paris, CDI"
  max_offer_age_days: 10
  contract_types:
    - CDI

matching:
  min_score: 6
  # Personnalisez les labels des catégories (optionnel)
  cat_a_label: "Tech & IA"
  cat_b_label: "Secteur"

# ─────────────────────────────────────────────────────────
# API KEYS — Remplissez au moins UN provider LLM
# ─────────────────────────────────────────────────────────

api:
  # Sources d'offres
  france_travail:
    client_id: ""
    client_secret: ""
  serpapi:
    api_key: ""

  # Providers LLM (OpenAI-compatible)
  # Tous ces providers utilisent le même format d'API que OpenAI.
  # Remplissez la clé du provider que vous voulez utiliser.
  openai:
    api_key: ""
  mistral:
    api_key: ""       # Tier gratuit : 1 milliard tokens/mois
  deepseek:
    api_key: ""       # Très bon marché, excellent en français
  openrouter:
    api_key: ""       # Agrège Claude, Gemini, GPT, etc.
  groq:
    api_key: ""       # Très rapide, gratuit (limité)
  custom:
    api_key: ""       # N'importe quelle API OpenAI-compatible

# ─────────────────────────────────────────────────────────
# LLM — Choisissez votre provider principal
# ─────────────────────────────────────────────────────────

llm:
  # ollama | mistral | openai | deepseek | openrouter | groq | custom | none
  provider: "ollama"

  # Modèle utilisé par votre provider (ignoré si ollama)
  # - mistral:   mistral-small-2506 (Small 3.2), ministral-8b-2410
  # - openai:    gpt-5.4-mini, gpt-5.4
  # - deepseek:  deepseek-v4-flash, deepseek-v4-pro
  # - openrouter: openai/gpt-5.4-mini, anthropic/claude-3.5-sonnet, google/gemini-2.0-flash
  # - groq:      llama-3.3-70b-versatile, openai/gpt-oss-120b
  model: "llama3.2"

  # Fallback si le provider principal échoue
  fallback_provider: "mistral"   # laisser vide si pas de fallback
  fallback_model: "mistral-small-2506"

  # Uniquement pour provider=custom : URL de base de l'API
  base_url: ""

# Chemins — remplis automatiquement par le setup wizard
_cv_path: ""
_letter_template_path: ""
